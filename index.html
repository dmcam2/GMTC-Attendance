<!DOCTYPE html>
<html>
<head>
  <title>Roll Marking System</title>
</head>
<body>

<h2>Class Attendance</h2>

<form id="attendanceForm">
  <div id="studentList"></div>
  <br>
  <button type="submit">Submit Attendance</button>
</form>

<p id="response"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxNmvFmCZEfqmuqUu46bgPFnZJxk-bsHJVnrBF62FKeO6KtHkYV2_ZUIDvj5U9Tl5fE/exec";

// Load students
fetch(scriptURL)
  .then(res => res.json())
  .then(students => {
    const container = document.getElementById("studentList");

    students.forEach((student, index) => {
      const div = document.createElement("div");

      div.innerHTML = `
        <strong>${student}</strong><br>
        <select name="status_${index}" required>
          <option value="">-- Select --</option>
          <option value="Present">Present</option>
          <option value="Absent">Absent</option>
        </select>
        <br><br>
      `;

      container.appendChild(div);
    });
  });

// Submit attendance
document.getElementById("attendanceForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const studentDivs = document.querySelectorAll("#studentList div");
  const records = [];

  studentDivs.forEach((div, index) => {
    const name = div.querySelector("strong").innerText;
    const status = div.querySelector("select").value;

    if (status !== "") {
      records.push({
        name: name,
        status: status
      });
    }
  });

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ records: records })
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("response").innerText = "Attendance submitted!";
    document.getElementById("attendanceForm").reset();
  })
  .catch(() => {
    document.getElementById("response").innerText = "Error submitting.";
  });
});
</script>

</body>
</html>
