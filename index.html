<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMTC Member Login</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
      --focus: #93c5fd;
      --shadow: 0 15px 35px rgba(2, 6, 23, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 50%, #020617 100%);
      display: grid;
      place-items: center;
      color: var(--text);
      padding: 1rem;
    }

    .login-card {
      width: min(100%, 420px);
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.7rem;
    }

    .subtitle {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: -0.25rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: auto;
      margin: 0;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 0.25rem;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .signup {
      text-align: center;
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: 0.93rem;
    }
  </style>
</head>
<body>
  <main class="login-card" aria-labelledby="portal-title">
    <h1 id="portal-title">Member Login Portal</h1>
    <p class="subtitle">Sign in to access your GMTC member dashboard.</p>

    <form action="#" method="post">
      <div>
        <label for="member-id">Member ID or Email</label>
        <input id="member-id" name="member-id" type="text" autocomplete="username" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <div class="row">
        <label class="remember" for="remember-me">
          <input id="remember-me" name="remember-me" type="checkbox" />
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Log In</button>
    </form>

    <p class="signup">Not a member yet? <a href="#">Request access</a></p>
  </main>
</body>
</html>
