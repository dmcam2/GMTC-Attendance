<!DOCTYPE html>
<html>
<head>
  <title>Roll Marking System</title>
</head>
<body>

  <h2>Mark Attendance</h2>

  <form id="rollForm">
    <label>Student Name:</label><br>
    <input type="text" id="name" required><br><br>

    <label>Status:</label><br>
    <select id="status">
      <option value="Present">Present</option>
      <option value="Absent">Absent</option>
      <option value="Late">Late</option>
    </select><br><br>

    <button type="submit">Submit</button>
  </form>

  <p id="response"></p>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwlSVt87Y2hwb7-c9M2uKOk6K98ZxqHbw2KSEMlZMevvR5jgvfli-zz4Td7xk96skW4/exec";

    document.getElementById("rollForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        status: document.getElementById("status").value
      };

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(response => {
        document.getElementById("response").innerText = "Submitted!";
        document.getElementById("rollForm").reset();
      })
      .catch(error => {
        document.getElementById("response").innerText = "Error submitting.";
      });
    });
  </script>

</body>
</html>
