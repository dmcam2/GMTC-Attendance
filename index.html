<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musical Theatre Attendance</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    header {
      background: #1a237e;
      color: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    header h1 {
      margin: 0;
    }

    .top-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    select,
    input,
    button {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #3949ab;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #283593;
    }

    .student-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
</html>
